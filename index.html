<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VC Valuation Simulator</title>
    <!--
      Webフォント(Google Fonts CDN、P6-3裁定)。Stage 1で唯一の外部リクエスト
      (docs/logs/phase6-rulings-20260714.md)。display=swap指定によりCDN取得中/不達時も
      トークンのフォールバックチェーン(Hiragino/system-ui/ui-monospace)で判読を維持する
      (src/theme/tokens.*.css参照。フォント取得の成否にE2Eは依存させない、出典: docs/phase6-spec.md §2)。
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@400;700&family=M+PLUS+Rounded+1c:wght@400;700&display=swap"
    />
    <!--
      初回描画のテーマ適用フラッシュ(FOUC)対策。テーマトークンは:root[data-theme=...]
      スコープだが、data-theme属性はThemeProviderのuseEffect(Reactマウント後)でしか
      付与されないため、描画前にlocalStorageの保存テーマを読んで先付けする。
      キー文字列はsrc/theme/themeContext.tsのTHEME_STORAGE_KEYと同値(テストで固定)。
      未保存時・不正値時はThemeProviderのreadStoredThemeと同じ既定'dark'にフォールバックする。
    -->
    <script id="theme-fouc-guard">
      (function () {
        var stored = window.localStorage.getItem('ev-valuation-simulator:theme')
        document.documentElement.setAttribute('data-theme', stored === 'light' ? 'light' : 'dark')
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
